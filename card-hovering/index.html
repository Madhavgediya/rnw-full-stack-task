<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Card Flip Hover</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card-container">
      <div class="card">
        <div class="card-face card-front">
          <h2>Web Design</h2>
          <p>Hover Me</p>
        </div>

        <div class="card-face card-back">
          <h2>About Service</h2>
          <p>
            We create modern, responsive and user-friendly websites using HTML,
            CSS & JavaScript.
          </p>
          <button>Learn More</button>
        </div>
      </div>
    </div>
  </body>
</html>
